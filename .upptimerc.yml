owner: goletro
repo: status

sites:
  - name: App
    url: https://app.goletro.com

  - name: API & Services
    url: https://app.goletro.com/api/status
    expectedStatusCodes:
      - 200

  - name: Goletro Website
    url: https://goletro.com

  - name: Database
    url: https://qgtmocvjdtohyqwpgwsh.supabase.co/rest/v1/
    expectedStatusCodes:
      - 200
      - 401

notification:
  email:
    to: $NOTIFICATION_EMAIL
  telegram:
    botToken: $TELEGRAM_BOT_TOKEN
    chatId: $TELEGRAM_CHAT_ID

assignees:
  - kuldeep-pawar12

status-website:
  cname: status.goletro.com
  name: " "
  logoUrl: https://goletro.com/logo.svg
  introTitle: "**Goletro** Service Status"
  introMessage: Real-time uptime monitoring for Goletro and its services. Updated every 5 minutes.
  navbar:
    - title: Goletro App
      href: https://app.goletro.com
    - title: Website
      href: https://goletro.com
    - title: Support
      href: https://goletro.com/contact
  customBodyHtml: |
    <style>
      .subscribe-form, .notification-form,
      [class*="subscribe"], [class*="Subscribe"] { display: none !important; }
      footer p, footer a,
      p:has(a[href*="upptime"]),
      p:has(a[href*="github"]) { display: none !important; }
    </style>
  customFootHtml: |
    <footer style="text-align:center; padding: 2rem 1rem; font-size: 13px; color: #9ca3af; border-top: 1px solid #e5e7eb; margin-top: 3rem;">
      &copy; 2026 Goletro Technologies Pvt Ltd &nbsp;·&nbsp;
      <a href="https://goletro.com" style="color:#9ca3af; text-decoration:none;">goletro.com</a>
      &nbsp;·&nbsp;
      <a href="https://goletro.com/contact" style="color:#9ca3af; text-decoration:none;">Support</a>
