    - title: Website
      href: https://goletro.com
    - title: Support
      href: https://goletro.com/contact
  customBodyHtml: |
    <style>
      .subscribe-form, .notification-form, [class*="subscribe"], [class*="Subscribe"] { display: none !important; }
    </style>
